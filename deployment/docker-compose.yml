version: "3.8"

services:
  mariadb:
    image: mariadb:10.11
    container_name: starmake-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./mariadb.cnf:/etc/mysql/conf.d/frappe.cnf:ro
    networks:
      - starmake-net
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-cache:
    image: redis:7-alpine
    container_name: starmake-redis-cache
    restart: always
    networks:
      - starmake-net

  redis-queue:
    image: redis:7-alpine
    container_name: starmake-redis-queue
    restart: always
    networks:
      - starmake-net

  starmake-app:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: starmake-app
    restart: always
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - ${BACKUP_PATH:-./backups}:/home/frappe/backups
    depends_on:
      mariadb:
        condition: service_healthy
      redis-cache:
        condition: service_started
      redis-queue:
        condition: service_started
    networks:
      - starmake-net
    ports:
      - "8000:8000"

  nginx:
    image: nginx:alpine
    container_name: starmake-nginx
    restart: always
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - sites-data:/home/frappe/frappe-bench/sites:ro
    ports:
      - "80:80"
    depends_on:
      - starmake-app
    networks:
      - starmake-net

  scheduler:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: starmake-scheduler
    restart: always
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - ${BACKUP_PATH:-./backups}:/home/frappe/backups
    depends_on:
      - starmake-app
    networks:
      - starmake-net
    command: bench schedule

  worker-short:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: starmake-worker-short
    restart: always
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
    depends_on:
      - starmake-app
    networks:
      - starmake-net
    command: bench worker --queue short

  worker-long:
    build:
      context: ..
      dockerfile: deployment/Dockerfile
    container_name: starmake-worker-long
    restart: always
    volumes:
      - sites-data:/home/frappe/frappe-bench/sites
      - ${BACKUP_PATH:-./backups}:/home/frappe/backups
    depends_on:
      - starmake-app
    networks:
      - starmake-net
    command: bench worker --queue long

volumes:
  mariadb-data:
  sites-data:

networks:
  starmake-net:
    driver: bridge
